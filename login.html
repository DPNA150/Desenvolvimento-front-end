<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="styleLogin.css">
</head>

<body>

    <div class="container">
        <strong>
            <label id="form-title">Login</label>
        </strong>

        <form id="login-form">
            <input type="text" id="login-username" placeholder="Nome de usuário">
            <input type="password" id="login-password" placeholder="Senha">
            <button type="button" onclick="login()">Entrar</button>
            <p><span onclick="toggleForm()">Não tem uma conta? Cadastre-se</span></p>
        </form>

        <form id="signup-form" style="display: none;">
            <input type="text" id="signup-username" placeholder="Nome de usuário">
            <input type="email" id="signup-email" placeholder="Email">
            <input type="tel" id="signup-number" placeholder="Número de telefone">
            <input type="password" id="signup-password" placeholder="Senha">
            <input type="password" id="signup-confirm-password" placeholder="Confirmar Senha">
            <button type="button" onclick="seguir()">Continuar</button>
            <p><span onclick="toggleForm()">Já tem uma conta? Faça login</span></p>
        </form>

        <form id="signup-form2" style="display: none;">
            <select id="tema-user">
                <option value="" disabled selected>Selecione o tema</option>
                <option>Futebol Europeu</option>
                <option>Futebol Inglês</option>
                <option>Futebol Brasileiro</option>
            </select>
            <button type="button" onclick="signup()">Cadastrar</button>
        </form>
    </div>

    <script>
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const signupForm2 = document.getElementById('signup-form2');
            const formTitle = document.getElementById('form-title');

            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                signupForm2.style.display = 'none';
                formTitle.textContent = 'Login';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                signupForm2.style.display = 'none';
                formTitle.textContent = 'Cadastro';
            }
        }

        function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (username === "" || password === "") {
                alert("Preencha todos os campos.");
                return;
            }

            alert("Login realizado!");
            window.location.href = "index.html";
        }

        function seguir() {
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;

            if (!username || !email || !password || !confirmPassword) {
                alert("Preencha todos os campos.");
                return;
            }

            if (password !== confirmPassword) {
                alert("Senhas não coincidem.");
                return;
            }

            // Ir para próxima etapa
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('signup-form2').style.display = 'block';
        }

        function signup() {
            const tema = document.getElementById('tema-user').value;

            if (!tema) {
                alert("Selecione um tema.");
                return;
            }

            alert("Cadastro realizado com sucesso!");
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
